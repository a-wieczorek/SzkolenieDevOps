name: 04 - Using Actions
on:
  push:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Printing Folders
        run: ls -la

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test