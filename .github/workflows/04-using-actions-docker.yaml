name: 04 - Using Actions Docker

on:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: 04-using-actions/docker-app
        run: |
          set -eux
          IMAGE_TAG=my-nginx:${GITHUB_SHA}
          docker build -t "${IMAGE_TAG}" .

          # zapisz tag do env, użyjemy go w kolejnych krokach
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Run container
        run: |
          set -eux

          CID=$(docker run -d -p 8080:80 "${IMAGE_TAG}")
          echo "CID=${CID}" >> "$GITHUB_ENV"

      - name: Wait for Nginx to be ready
        run: |
          set -eux
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              echo "Nginx odpowiada"; exit 0
            fi
            sleep 1
          done
          echo "Nginx nie wstał na czas" >&2
          exit 1

      - name: Test page content with curl
        run: |
          set -eux
          BODY=$(curl -fsS http://localhost:8080/)
          echo "----- PAGE BODY START -----"
          echo "$BODY"
          echo "------ PAGE BODY END ------"

          echo "$BODY" | grep -qi "szkolenie github"

      - name: Cleanup
        if: always()
        run: |
          set -eux

          if [ -n "${CID:-}" ]; then
            docker logs "$CID" || true
            docker rm -f "$CID" || true
          fi