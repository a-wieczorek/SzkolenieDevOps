name: 03 - Workflow Runners
on:
  workflow_dispatch:
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on an Ubuntu runner."
          echo "$RUNNER_OS"

  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "This job is running on an Windows runner."
          echo "$RUNNER_OS"

  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        run: |
          echo "This job is running on an MacOS runner."
          echo "$RUNNER_OS"

  self-hosted:
    runs-on: self-hosted
    steps:
      - name: Show OS
        run: |
          echo "This job is running on an self-hosted runner."
          echo "$RUNNER_OS"
          # ip a
          # echo "Ending" > test.txt