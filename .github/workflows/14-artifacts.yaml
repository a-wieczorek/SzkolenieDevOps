name: 14 – Working with Artifacts
on:
  workflow_dispatch:

jobs:
  workflow_dispatch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 14-artifacts/react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Download dependencies
        uses: actions/cache@v3
        with:
          id: cache
          key: deps-node-modules-${{ hashFiles('14-artifacts/react-app/package-lock.json') }}
          path: 14-artifacts/react-app/node_modules

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Build code
        run: npm run build

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: 14-artifacts/react-app/build

  deploy:
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build

      - name: Show folder structure
        run: ls -R
